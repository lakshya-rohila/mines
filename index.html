<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mines - Casino Game</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--accent:#f0b90b;--accent2:#ffd700;--gem:#00e676;--mine:#ff1744;--text:#fff;--text2:#9ca3af;--border:#2a2a3e;--radius:12px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:820px;padding:16px;margin:0 auto}

.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--bg2);border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--border)}
.logo{font-size:24px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.balance-display{display:flex;align-items:center;gap:12px;background:var(--bg);padding:8px 16px;border-radius:8px;border:1px solid var(--border)}
.balance-label{font-size:13px;color:var(--text2)}
.balance-amount{font-size:18px;font-weight:700;color:var(--accent)}

.game-area{display:flex;gap:16px;margin-bottom:16px}
@media(max-width:680px){.game-area{flex-direction:column}}

.grid-section{flex:1}
.grid-container{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--border);aspect-ratio:1}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;height:100%}
.cell{background:var(--bg3);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;border:1px solid var(--border);aspect-ratio:1;user-select:none}
.cell:hover:not(.revealed):not(.disabled){background:#1e2a4a;border-color:var(--accent)}
.cell.revealed{cursor:default;background:var(--bg)}
.cell.gem{background:rgba(0,230,118,.12);border-color:rgba(0,230,118,.3)}
.cell.mine{background:rgba(255,23,68,.15);border-color:rgba(255,23,68,.35)}
.cell.hit-mine{background:rgba(255,23,68,.35);border-color:var(--mine)}
.cell.disabled{pointer-events:none}
.cell .icon{font-size:26px;line-height:1}

.controls-section{width:240px;min-width:240px;display:flex;flex-direction:column;gap:12px}
@media(max-width:680px){.controls-section{width:100%;min-width:unset}}

.multiplier-box{background:var(--bg2);border-radius:var(--radius);padding:20px;text-align:center;border:1px solid var(--border);position:relative}
.multiplier-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.multiplier-value{font-size:42px;font-weight:900;display:block;line-height:1.1;color:var(--text)}
.multiplier-value.active{color:var(--accent)}
.multiplier-value.high{color:var(--gem)}
.multiplier-label{font-size:13px;color:var(--text2);margin-top:4px;display:block}

.control-group{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border)}
.control-group label{font-size:13px;color:var(--text2);display:block;margin-bottom:8px;font-weight:500}
.mines-selector{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mines-selector button{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.mines-selector button:hover{background:var(--bg3);border-color:var(--accent);color:var(--accent)}
.mines-selector .mines-value{font-size:20px;font-weight:700;min-width:40px;text-align:center;color:var(--accent)}
.mines-presets{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.mines-presets button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:11px;cursor:pointer}
.mines-presets button:hover{border-color:var(--accent);color:var(--accent)}
.mines-presets button.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}

.bet-input-wrap{display:flex;align-items:center;gap:8px}
.bet-input-wrap input{flex:1;min-width:60px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;font-weight:600;outline:none}
.bet-input-wrap input:focus{border-color:var(--accent)}
.bet-input-wrap input::-webkit-inner-spin-button{-webkit-appearance:none}
.bet-input-wrap .bet-half,.bet-input-wrap .bet-double{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer;font-weight:600}
.bet-input-wrap .bet-half:hover,.bet-input-wrap .bet-double:hover{border-color:var(--accent);color:var(--accent)}

.btn-action{width:100%;padding:16px;border:none;border-radius:var(--radius);font-size:18px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.btn-action.place{background:linear-gradient(135deg,var(--accent),#d4a005);color:#000}
.btn-action.place:hover{opacity:.9}
.btn-action.place:disabled{opacity:.4;cursor:not-allowed}
.btn-action.cashout{background:linear-gradient(135deg,var(--gem),#00c853);color:#000}
.btn-action.cashout:hover{opacity:.9}
.btn-action.cashout:disabled{opacity:.4;cursor:not-allowed}
.btn-action.next{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-action.next:hover{background:var(--border)}

.win-preview{background:var(--bg2);border-radius:var(--radius);padding:12px 16px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;opacity:0}
.win-preview.visible{opacity:1}
.win-preview .label{font-size:13px;color:var(--text2)}
.win-preview .amount{font-size:22px;font-weight:800;color:var(--gem)}

.stats-bar{display:flex;gap:8px;justify-content:space-between;background:var(--bg2);border-radius:var(--radius);padding:12px 20px;border:1px solid var(--border)}
.stats-bar .stat{text-align:center;flex:1}
.stats-bar .stat-label{font-size:11px;color:var(--text2);display:block;text-transform:uppercase;letter-spacing:.5px}
.stats-bar .stat-value{font-size:16px;font-weight:700;display:block;margin-top:2px}
.stats-bar .stat-value.positive{color:var(--gem)}
.stats-bar .stat-value.negative{color:var(--mine)}

.notification{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:14px 28px;border-radius:var(--radius);font-weight:700;font-size:16px;z-index:1000;text-align:center;pointer-events:none;min-width:200px}
.notification.show{transform:translateX(-50%) translateY(0)}
.notification.win{background:linear-gradient(135deg,var(--gem),#00c853);color:#000;box-shadow:0 4px 24px rgba(0,230,118,.4)}
.notification.lose{background:linear-gradient(135deg,var(--mine),#d50000);color:#fff;box-shadow:0 4px 24px rgba(255,23,68,.4)}
.notification.info{background:var(--bg2);color:var(--text);border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.4)}

.auto-group .auto-header{display:flex;justify-content:space-between;align-items:center}
.auto-toggle{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer}
.auto-toggle:hover{border-color:var(--accent);color:var(--accent)}
.auto-body{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.auto-row{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.auto-row input[type="number"]{width:80px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-weight:600;outline:none}
.auto-row input[type="number"]:focus{border-color:var(--accent)}
.auto-row input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px}
.auto-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.btn-auto{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--accent);color:#000;font-size:14px;font-weight:700;cursor:pointer}
.btn-auto:hover{opacity:.85}
.btn-auto.stop{background:var(--mine);color:#fff;border-color:var(--mine)}
.auto-progress{text-align:center;font-size:13px;color:var(--text2);padding:4px}
.auto-progress span{font-weight:600;color:var(--accent)}

.reset-btn{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;z-index:100}
.reset-btn:hover{border-color:var(--mine);color:var(--mine)}
</style>
</head>
<body>

<div id="app">
    <header class="header">
        <div class="logo">MINES</div>
        <div class="balance-display">
            <span class="balance-label">BALANCE</span>
            <span class="balance-amount" id="balanceDisplay">$1,000.00</span>
        </div>
    </header>

    <div class="game-area">
        <div class="grid-section">
            <div class="grid-container">
                <div class="grid" id="grid"></div>
            </div>
        </div>

        <div class="controls-section">
            <div class="multiplier-box">
                <span class="multiplier-value" id="multiplierValue">1.00x</span>
                <span class="multiplier-label">Multiplier</span>
            </div>

            <div class="control-group">
                <label>Mines</label>
                <div class="mines-selector">
                    <button id="minesDown">&minus;</button>
                    <span class="mines-value" id="minesCount">3</span>
                    <button id="minesUp">+</button>
                </div>
                <div class="mines-presets" id="minesPresets">
                    <button data-mines="1">1</button>
                    <button data-mines="3" class="active">3</button>
                    <button data-mines="5">5</button>
                    <button data-mines="10">10</button>
                    <button data-mines="15">15</button>
                    <button data-mines="24">24</button>
                </div>
            </div>

            <div class="control-group">
                <label>Bet Amount</label>
                <div class="bet-input-wrap">
                    <input type="number" id="betAmount" value="10" min="0.01" step="1">
                    <button class="bet-half" id="betHalf">&frac12;</button>
                    <button class="bet-double" id="betDouble">2x</button>
                </div>
            </div>

            <button class="btn-action place" id="actionBtn">Place Bet</button>

            <div class="win-preview" id="winPreview">
                <span class="label">Cash Out</span>
                <span class="amount" id="winAmount">$0.00</span>
            </div>

            <div class="control-group auto-group">
                <div class="auto-header">
                    <label>Auto Play</label>
                    <button class="auto-toggle" id="autoToggle">Show</button>
                </div>
                <div class="auto-body" id="autoBody" style="display:none">
                    <div class="auto-row">
                        <span>Number of Bets</span>
                        <input type="number" id="autoRounds" value="10" min="1" max="1000">
                    </div>
                    <div class="auto-row">
                        <span>Cash Out at (x)</span>
                        <input type="number" id="autoTarget" value="2.00" min="1.01" step="0.01">
                    </div>
                    <div class="auto-row">
                        <label><input type="checkbox" id="stopOnWin"> Stop on win</label>
                        <label><input type="checkbox" id="stopOnLoss"> Stop on loss</label>
                    </div>
                    <button class="btn-auto" id="autoStartBtn">Start Auto</button>
                    <div class="auto-progress" id="autoProgress" style="display:none">Progress: <span id="autoProgressText">0/0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat"><span class="stat-label">Games</span><span class="stat-value" id="statGames">0</span></div>
        <div class="stat"><span class="stat-label">Won</span><span class="stat-value" id="statWon">0</span></div>
        <div class="stat"><span class="stat-label">Win Rate</span><span class="stat-value" id="statRate">0%</span></div>
        <div class="stat"><span class="stat-label">Profit</span><span class="stat-value" id="statProfit">$0.00</span></div>
    </div>
</div>

<div class="notification" id="notification"></div>
<button class="reset-btn" id="resetBtn">Reset Balance</button>

<script src="mines.js"></script>
</body>
</html>
